<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS Card Component</title>
    <style>
      body {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
      }
      .Card {
        width: 300px;
        background-color: #f0f0f0;
        padding: 0px;
        border-radius: 10px;
        box-shadow: 4px 4px 8px 4px gray;
        transition: all 0.2s ease-out;
        overflow: hidden;
      }
      h1 {
        text-align: center;
        font-weight:200;
        margin: 5px 0;
      }
      img {
        width: 100%;
        max-height: 200px;
        object-fit: cover;
        padding: 0;
        transition: all 0.2s ease-out;
      }
      p {
        font-size: 14px;
        color: #333;
        padding: 0 10px 10px 10px;
      }
      button {
        display: block;
        width: 100%;
        padding: 10px;
        background-color: #000000;
        color: white;
        border: none;
        cursor: pointer;
      }
      .Card button:hover {
        background-color: #555555;
      }
      .img-container {
        overflow: hidden;
        height: 200px;
      }
      img:hover {
        transform: scale(1.05);
      }
      .Card:hover {
        transform: scale(1.05);
        box-shadow: 16px 16px 8px 4px gray;
      }
    </style>
  </head>
  <body>
    <div class="Card">
      <div class="img-container">
      <img src="tiger.jpg" alt="Card Image" />
      </div>
      <h1>Tiger</h1>
      <p>
        The tiger (Panthera tigris) is a large cat and a member of the genus
        Panthera native to Asia. It has a powerful, muscular body with a large
        head and paws.
      </p>
      <button>Read More</button>
    </div>
  </body>
</html>
