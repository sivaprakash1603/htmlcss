<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dropdown Menu</title>
    <style>
        nav{
            width: 100%;
            background-color: #f0f0f0;
            padding: 0px ;
            border-radius:10px ;
            margin: 20px;
        }
        nav ul{
            display: flex;
            justify-content: space-around;
            list-style: none;
            padding: 0;
            margin: 0;
        }
        nav ul li{
            position: relative;
            padding: 10px;
            background-color: #f0f0f0;
            margin: 5px 0;
            cursor: pointer;
            text-align: center;
        }
        nav ul li ul{
            max-height: 0;
            opacity: 0;
            position: absolute;
            top: 100%;
            left: 0;
            background-color: #f0f0f0;
            padding: 0;
            width: 100px;
            overflow: hidden;
            transition: max-height 0.5s ease-out, opacity 0.5s ease-out;
        }
        nav ul li ul li{
            padding: 10px;
            background-color: #f0f0f0;
            margin: 0;
        }
        nav ul li ul li:hover{
            background-color: #e0e0e0;
        }
        nav ul li:hover ul{
            display: block;
            opacity: 1;
            max-height: fit-content;
        }
        @media screen and (max-width: 600px){
            nav ul{
                flex-direction: column;
                align-items: center;
            }
            nav ul li{
                width: 100%;
                text-align: center;
                margin-bottom:0;
                padding-bottom: 0px
            }
            nav ul li ul{
                display: block;
                position: static;
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <nav>
        <ul>
            <li>item 1
                <ul>
                    <li>sub-item 1</li>
                    <li>sub-item 2</li>
                </ul>
            </li>
            <li>item 2
                <ul>
                    <li>sub-item 1</li>
                    <li>sub-item 2</li>
                    <li>sub-item 3</li>
                </ul>
            </li>

            <li>item 3
                <ul>
                    <li>sub-item 1</li>
                    <li>sub-item 2</li>
                </ul>
            </li>
            <li>item 4
                <ul>
                    <li>sub-item 1</li>
                    <li>sub-item 2</li>
                </ul>
            </li>
            <li>item 5
                <ul>
                    <li>sub-item 1</li>
                    <li>sub-item 2</li>
                </ul>
            </li>
        </ul>
    </nav>
</body>
</html>
